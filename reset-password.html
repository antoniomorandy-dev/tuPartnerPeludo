<html>
    <head>
        <title>Tu Partner Peludo - Restablecer Contraseña</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
        <link rel="icon" type="image/png" href="images/logo.png">
        <link rel="stylesheet" href="PetShopApi/CSS/index.css">
    </head>
    <body>
        <div class="container d-flex justify-content-center align-items-center min-vh-100">
            <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%;">
                <div class="text-center mb-4">
                    <img src="images/logo.png" alt="Logo" class="logo-medalla-img mb-3" style="width: 80px;">
                    <h4 class="text-center" id="tituloReset">Restablecer Contraseña</h4>
                </div>
                
                <form id="formRestablecer">
                    <div class="mb-3">
                        <label class="form-label">Nueva Contraseña</label>
                        <input type="password" id="pass1" class="form-control" required>
                        <div id="requisitos" class="small mt-2">
                            <div id="check-mayus" class="text-danger">✕ Una mayúscula</div>
                            <div id="check-minus" class="text-danger">✕ Una minúscula</div>
                            <div id="check-numero" class="text-danger">✕ Un número</div>
                            <div id="check-largo" class="text-danger">✕ Mínimo 8 caracteres</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirmar Contraseña</label>
                        <input type="password" id="pass2" class="form-control" required>
                        <div id="check-coincide" class="small mt-1 text-danger d-none">Las contraseñas no coinciden</div>
                    </div>

                    <button type="submit" id="btnGuardar" class="btn btn-primary w-100" disabled>Guardar Cambios</button>
                </form>
            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
        <script src="PetShopApi/script/config.js"></script>
        <script src="PetShopApi/script/master.js" defer></script>
        <script src="PetShopApi/script/reset-password.js" defer></script>
    </body>
</html>
