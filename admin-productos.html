
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Partner Peludo - Panel Principal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link  rel="stylesheet" href="PetShopApi/CSS/admin-productos.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="PetShopApi/script/config.js"></script>
    <script src="PetShopApi/script/admin-productos.js" defer></script>
    <script src="PetShopApi/script/carrito.js" defer></script>
    <script src="PetShopApi/script/auth-utils.js" defer></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white p-3 border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
                <img src="images/logo.png" alt="Logo" width="45" height="45" class="me-2 rounded-circle border border-dark">
                Tu Partner Peludo
            </a>
            <div class="d-flex align-items-center">
                <button onclick="logout()" class="btn btn-sm ms-3 btn-outline-danger"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar-admin p-3 border-end min-vh-100 bg-white">
                <h5 class="text-secondary small fw-bold mb-3">PANEL DE CONTROL</h5>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2">
                        <a href="admin-productos.html" class="nav-link text-dark active bg-light rounded">
                            <i class="fas fa-box-open me-2"></i> Gestionar Productos
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="admin-usuarios.html" class="nav-link text-dark">
                            <i class="fas fa-users me-2"></i> Ver Usuarios
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="admin-pedidos.html" class="nav-link text-dark">
                            <i class="fas fa-clipboard-list me-2"></i> Ver Pedidos
                        </a>
                    </li>
                    <hr>
                    <li class="nav-item">
                        <a href="main.html" class="nav-link text-primary">
                            <i class="fas fa-arrow-left me-2"></i> Volver a la Tienda
                        </a>
                    </li>
                </ul>
            </div>
            <main class="col-md-10 p-4">
                <h2 class="mb-4 text-center">Gestión de Inventario</h2>
                <div class="row justify-content-center">
                    <div class="col-lg-8 col-md-10">
                        <div class="card shadow-sm p-4 mb-5">
                            <h4 class="mb-3">Agregar Nuevo Producto Prueba 2</h4>
                            <form id="form-producto">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Nombre</label>
                                        <input type="text" id="nombre" class="form-control" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Precio</label>
                                        <input type="number" id="precio" class="form-control" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Descripción</label>
                                    <textarea id="descripcion" class="form-control" rows="2"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Stock</label>
                                    <input type="number" id="stock" class="form-control" placeholder="Cantidad disponible" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Seleccionar Imagen</label>
                                    <input type="file" id="imagenProducto" class="form-control" accept="image/*" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Guardar Producto Prueba</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="card shadow-sm p-4">
                    <h4 class="mb-3">Productos Existentes</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="tabla-productos">
                            <thead class="table-light">
                                <tr>
                                    <th>Imagen</th>
                                    <th>Nombre</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="lista-productos">
                                </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
