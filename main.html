<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Partner Peludo - Panel Principal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link  rel="stylesheet" href="PetShopApi/CSS/index.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="PetShopApi/script/master.js" defer></script>
    <script src="PetShopApi/script/carrito.js" defer></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white navbar-custom p-3">
        <div class="container">
            
            <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
            <img src="images/logo.png" alt="Logo" width="45" height="45" class="me-2 rounded-circle border border-dark">
            Tu Partner Peludo
        </a>
            
            <div class="d-flex align-items-center">
                <span id="user-name" class="me-3 fw-bold small"></span>
                <img id="user-img" src="" class="rounded-circle user-avatar">
                <button onclick="logout()" class="btn btn-sm ms-3"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        <div class="d-flex align-items-center">
            <a href="#" class="text-dark me-4 position-relative" onclick="abrirCarrito()">
                <i class="fas fa-shopping-cart fa-lg"></i>
                <span id="contador-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </a>
            
            <span id="user-name" class="me-3 fw-bold small"></span>
            <img id="user-img" src="" class="rounded-circle user-avatar">
            <button onclick="logout()" class="btn btn-sm ms-3"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="container my-5 text-center">
        <h1 class="display-5 fw-bold">Bienvenido a Tu Partner Peludo</h1>
        
        <div class="row mt-5">
            <div class="col-md-4">
                <a href="#" class="text-decoration-none text-dark">
                    <div class="card p-4 border-2 border-dark shadow-sm">
                        <i class="fas fa-bone fa-3x"></i>
                        <h5>Placas Grabadas</h5>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="#" class="text-decoration-none text-dark">
                    <div class="card p-4 border-2 border-dark shadow-sm">
                        <i class="fas fa-dog fa-3x"></i>
                        <h5>Accesorios</h5>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="#" class="text-decoration-none text-dark">
                    <div class="card p-4 border-2 border-dark shadow-sm">
                        <i class="fas fa-paw fa-3x"></i>
                        <h5>Collar Personalizado</h5>
                    </div>
                </a>
            </div>
        </div>

    </div>


    <script>
        // Función para decodificar el token
        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        };
    
        window.onload = function() {
            // Intentamos obtener cualquiera de las dos formas de sesión
            const googleToken = localStorage.getItem('google_token');
            const userSession = localStorage.getItem('user_session');
    
            if (!googleToken && !userSession) {
                // Si no hay absolutamente nada, fuera
                window.location.replace("index.html");
            } else {
                // Prioridad a los datos de la sesión unificada
                if (userSession) {
                    const data = JSON.parse(userSession);
                    document.getElementById('user-name').innerText = data.nombre.toUpperCase();
                    document.getElementById('user-img').src = data.foto || "images/default-user.png";
                } 
                // Si solo hay token de Google (como respaldo)
                else if (googleToken) {
                    const userData = parseJwt(googleToken);
                    document.getElementById('user-name').innerText = userData.name.toUpperCase();
                    document.getElementById('user-img').src = userData.picture;
                }
            }
        }
    
        function logout() {
            // Limpiamos todo para que no queden rastros
            localStorage.removeItem('google_token');
            localStorage.removeItem('user_session');
            localStorage.removeItem('session_token');
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
