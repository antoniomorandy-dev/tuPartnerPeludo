<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Partner Peludo - Panel Principal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link  rel="stylesheet" href="PetShopApi/CSS/main.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="PetShopApi/script/main.js" defer></script>
    <script src="PetShopApi/script/master.js" defer></script>
    <script src="PetShopApi/script/carrito.js" defer></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white p-3 border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
                <img src="images/logo.png" alt="Logo" width="45" height="45" class="me-2 rounded-circle border border-dark">
                Tu Partner Peludo
            </a>
            
            <div class="d-flex align-items-center">
                <a href="#" class="text-dark me-4 position-relative" onclick="abrirCarrito()">
                    <i class="fas fa-shopping-cart fa-lg"></i>
                    <span id="contador-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </a>
                
                <span id="user-name" class="me-2 fw-bold small text-uppercase"></span>
                <img id="user-img" src="" class="rounded-circle user-avatar" width="40" height="40">
                <button onclick="logout()" class="btn btn-sm ms-3 btn-outline-danger"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <aside class="col-md-2 bg-white p-3 border-end" style="min-height: 80vh;">
                <h5 class="fw-bold mb-4">Categorías</h5>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a href="#" class="nav-link text-dark active" onclick="filtrarProductos('todos')">Todos</a></li>
                    <li class="nav-item mb-2"><a href="#" class="nav-link text-dark" onclick="filtrarProductos('placas')">Placas</a></li>
                    <li class="nav-item mb-2"><a href="#" class="nav-link text-dark" onclick="filtrarProductos('accesorios')">Accesorios</a></li>
                </ul>
            </aside>

            <main class="col-md-10 p-4">
                <h2 class="mb-4">Productos Destacados</h2>
                <div class="row" id="contenedor-productos">
                    </div>
            </main>
        </div>
    </div>


    <script>
        // Función para decodificar el token
        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        };
    
        window.onload = function() {
            // Intentamos obtener cualquiera de las dos formas de sesión
            const googleToken = localStorage.getItem('google_token');
            const userSession = localStorage.getItem('user_session');
    
            if (!googleToken && !userSession) {
                // Si no hay absolutamente nada, fuera
                window.location.replace("index.html");
            } else {
                // Prioridad a los datos de la sesión unificada
                if (userSession) {
                    const data = JSON.parse(userSession);
                    document.getElementById('user-name').innerText = data.nombre.toUpperCase();
                    document.getElementById('user-img').src = data.foto || "images/default-user.png";
                } 
                // Si solo hay token de Google (como respaldo)
                else if (googleToken) {
                    const userData = parseJwt(googleToken);
                    document.getElementById('user-name').innerText = userData.name.toUpperCase();
                    document.getElementById('user-img').src = userData.picture;
                }
            }
        }
    
        function logout() {
            // Limpiamos todo para que no queden rastros
            localStorage.removeItem('google_token');
            localStorage.removeItem('user_session');
            localStorage.removeItem('session_token');
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
